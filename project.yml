# Backup project definition for XcodeGen (https://github.com/yonaskolb/XcodeGen).
# The repo already ships a ready-to-open SitUpright.xcodeproj, so you normally do
# NOT need this. Use it only if you want to regenerate the project cleanly:
#
#   brew install xcodegen
#   cd SitUpright
#   xcodegen generate
#
name: SitUpright
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
targets:
  SitUpright:
    type: application
    platform: macOS
    sources:
      - path: SitUpright
        excludes:
          - "Info.plist"
          - "SitUpright.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.SitUpright
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: SitUpright/Info.plist
        CODE_SIGN_ENTITLEMENTS: SitUpright/SitUpright.entitlements
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_VERSION: "5.0"
